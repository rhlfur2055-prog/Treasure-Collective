<!DOCTYPE html>
  <html lang="ko">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보물모아 · Treasure Collective</title>
  <meta name="description" content="보물모아 - 나만의 보물을 모으고 나누는 공간">
  <style>
  :root{--bg:#0f1220;--card:#1a1f36;--accent:#f5c451;--text:#e8eaf2;--muted:#9aa0b5}
  *{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(160deg,#0f1220,#1a1f36);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{padding:24px 32px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:22px;font-weight:800;letter-spacing:.5px}
.logo span{color:var(--accent)}
nav a{color:var(--muted);text-decoration:none;margin-left:24px;font-size:15px}
nav a:hover{color:var(--text)}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
.hero h1{font-size:clamp(32px,6vw,56px);line-height:1.15;margin-bottom:18px}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--muted);font-size:18px;max-width:560px;margin:0 auto 32px}
.btn{display:inline-block;background:var(--accent);color:#1a1f36;font-weight:700;padding:14px 30px;border-radius:10px;text-decoration:none;transition:transform .15s}
.btn:hover{transform:translateY(-2px)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;max-width:900px;margin:60px auto 0;width:100%}
.card{background:var(--card);border:1px solid #262c48;border-radius:14px;padding:26px;text-align:left}
.card h3{color:var(--accent);margin-bottom:10px;font-size:18px}
.card p{color:var(--muted);font-size:14px;line-height:1.6}
footer{text-align:center;padding:24px;color:var(--muted);font-size:13px}
</style>
  </head>
  <body>
  <header>
  <div class="logo">보물<span>모아</span></div>
  <nav><a href="#features">소개</a><a href="#contact">문의</a></nav>
  </header>
  <main>
  <section class="hero">
  <h1>나만의 <span>보물</span>을 모으고 나누다</h1>
  <p>보물모아는 흩어진 소중한 것들을 한곳에 모아 기록하고 공유하는 공간입니다. 지금 여정을 시작해보세요.</p>
  <a class="btn" href="#features">둘러보기</a>
  </section>
  <section class="cards" id="features">
  <div class="card"><h3>모으기</h3><p>당신의 보물을 카테고리별로 정리하고 한눈에 관리하세요.</p></div>
        <div class="card"><h3>기록하기</h3><p>각 보물에 담긴 이야기와 순간을 기록으로 남기세요.</p></div>
  <div class="card"><h3>나누기</h3><p>소중한 컬렉션을 원하는 사람들과 안전하게 공유하세요.</p></div>
  </section>
  </main>
  <footer id="contact">© 2026 보물모아 · Treasure Collective · bomulmoa.com</footer>
  </body>
  </html>
